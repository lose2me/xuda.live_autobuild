name: Autoupdate

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generator:
    name: Build & Upload
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: |
            **/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |-
          pnpm run docs:build

      - name: Create source archive
        run: |
          git archive --format=zip --output repo-${{ github.sha }}.zip HEAD

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: autobuild-${{ github.run_number }}
          name: Autobuild ${{ github.run_number }}
          files: repo-${{ github.sha }}.zip

      - name: Install Coscmd And Tccli
        run: |
          pip3 install coscmd tccli

      - name: Configure Tencent Cloud COS
        env:
          TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          TENCENT_COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
        run: |
          coscmd config -a $TENCENT_COS_SECRET_ID -s $TENCENT_COS_SECRET_KEY -b $TENCENT_COS_BUCKET -e cos.accelerate.myqcloud.com

      - name: Upload to Tencent Cloud COS
        run: |
          coscmd upload -rs -f src/.vuepress/dist/ / --delete

      - name: Sync xzitpocket data
        run: |
          mkdir -p data/images
          curl -sf "https://api.github.com/repos/lose2me/xzitpocket/releases?per_page=30" -o data/releases.json || echo "[]" > data/releases.json
          APK_URL=$(cat data/releases.json | python3 -c "
          import json,sys
          for r in json.load(sys.stdin):
            for a in r.get('assets',[]):
              if 'arm64-v8a-release.apk' in a['name']:
                print(a['browser_download_url']); sys.exit()
          ")
          if [ -n "$APK_URL" ]; then
            curl -fL --connect-timeout 10 --max-time 120 "$APK_URL" -o data/app-arm64-v8a-release.apk || echo "APK download failed, skipping"
          fi
          git clone --bare https://github.com/lose2me/xzitpocket.git /tmp/xzitpocket-bare 2>/dev/null && \
            git --git-dir=/tmp/xzitpocket-bare log --format='%H%x00%aN%x00%aI%x00%B%x00' | python3 -c "
          import sys, json
          data = sys.stdin.read().split('\x00')
          entries, i = [], 0
          while i + 3 < len(data):
              sha = data[i].strip()
              if not sha:
                  i += 1
                  continue
              entries.append({'sha': sha, 'committer': {'login': data[i+1]}, 'commit': {'author': {'date': data[i+2]}, 'message': data[i+3].strip()}, 'html_url': 'https://github.com/lose2me/xzitpocket/commit/' + sha})
              i += 4
          json.dump(entries, open('data/commits.json', 'w'), ensure_ascii=False)
          " || echo '[]' > data/commits.json
          rm -rf /tmp/xzitpocket-bare 2>/dev/null || true
          curl -sf -H "Accept: application/vnd.github.html" "https://api.github.com/repos/lose2me/xzitpocket/readme" -o data/readme.html || echo "" > data/readme.html
          if [ -s data/readme.html ]; then
            grep -oE 'https://(github\.com|raw\.githubusercontent\.com)/lose2me/xzitpocket/[^"]+' data/readme.html | \
              grep -iE '\.(png|jpg|jpeg|gif|svg|webp)' | sort -u | while read url; do
                filename=$(basename "${url%%\?*}")
                if curl -sfL "$url" -o "data/images/$filename"; then
                  sed -i "s|${url}|/api/xzitpocket/images/${filename}|g" data/readme.html
                fi
              done
          fi
          coscmd upload -rs data/ /api/xzitpocket/

      - name: Sync xuda commits
        run: |
          mkdir -p xuda-data
          git log --format='%H%x00%aN%x00%aI%x00%B%x00' | python3 -c "
          import sys, json
          data = sys.stdin.read().split('\x00')
          entries, i = [], 0
          while i + 3 < len(data):
              sha = data[i].strip()
              if not sha:
                  i += 1
                  continue
              entries.append({'sha': sha, 'committer': {'login': data[i+1]}, 'commit': {'author': {'date': data[i+2]}, 'message': data[i+3].strip()}, 'html_url': 'https://github.com/lose2me/xuda.live_autobuild/commit/' + sha})
              i += 4
          json.dump(entries, open('xuda-data/commits.json', 'w'), ensure_ascii=False)
          "
          coscmd upload -rs xuda-data/ /api/xuda/

      - name: Scrape docs for MeiliSearch
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MEILISEARCH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: /root/scrape-docs.sh
